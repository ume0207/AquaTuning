<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f2f8fa" />
    <meta name="description" content="Aqua Tuning Talk" />
    <title>Aqua Tuning | Talk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="メインナビゲーション">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div>
          <div><p class="brand-name">Aqua<br />Tuning</p><p class="brand-sub">TALK</p></div>
        </div>

        <div class="profile-card">
          <div class="avatar avatar-user">上</div>
          <div><p class="profile-label">MEMBER</p><p class="profile-name">上萩 環さん</p></div>
          <button class="icon-button" id="profile-button" aria-label="プロフィールメニュー">•••</button>
          <div class="profile-popover" id="profile-popover" hidden>
            <p>MY ACCOUNT</p><strong>上萩 環さん</strong>
            <button data-toast="プロフィール編集は準備中です">プロフィールを編集</button>
            <button data-toast="ログアウト機能は準備中です">ログアウト</button>
          </div>
        </div>

        <nav class="side-nav">
          <button class="side-link active" data-thread-list><span class="nav-icon">◌</span>トーク</button>
          <div class="nav-divider"></div>
          <button class="side-link" data-toast="お知らせ一覧は準備中です"><span class="nav-icon">♢</span>お知らせ<span class="nav-badge">2</span></button>
          <button class="side-link" data-toast="ヘルプセンターは準備中です"><span class="nav-icon">?</span>ヘルプ</button>
        </nav>

        <div class="sidebar-bottom"><div class="water-line"></div><p>Aqua Tuning</p><span>COMMUNITY TALK</span></div>
      </aside>

      <button class="drawer-scrim" id="drawer-scrim" aria-label="メニューを閉じる" hidden></button>

      <main class="main-content">
        <header class="topbar">
          <button class="mobile-menu" id="mobile-menu" aria-label="メニューを開く">☰</button>
          <div class="breadcrumb"><span>受講者ポータル</span><b>/</b><strong>Aqua Tuning</strong></div>
          <div class="top-actions">
            <button class="circle-action" data-toast="検索機能は準備中です" aria-label="検索">⌕</button>
            <button class="circle-action notification" id="notification-button" aria-label="通知">♧<i></i></button>
          </div>
          <div class="notification-popover" id="notification-popover" hidden>
            <div class="popover-heading"><strong>お知らせ</strong><span>2件</span></div>
            <button data-toast="お知らせを確認しました"><b>講師</b><span>新しい投稿があります</span><small>昨日</small></button>
            <button data-toast="お知らせを確認しました"><b>運営</b><span>Aqua Tuning Talkへようこそ</span><small>2日前</small></button>
          </div>
        </header>

        <section class="room-header">
          <div><p class="eyebrow"><span class="eyebrow-dot"></span> COMMUNITY TALK</p><h1>Aqua Tuning</h1></div>
          <button class="outline-button" data-toast="トークをフォローしました">♡ フォロー</button>
        </section>

        <div class="content-wrap">
          <div class="room-toolbar"><div><strong>トーク</strong><span>スレッドを選択してください</span></div><button data-toast="参加者一覧は準備中です">◉ 参加者 18名　⌄</button></div>

          <section class="thread-list-view" id="thread-list-view" aria-labelledby="thread-index-title">
            <div class="section-heading"><div><p class="section-kicker">THREAD INDEX</p><h2 id="thread-index-title">トーク一覧</h2></div><span class="thread-count">6スレッド</span></div>
            <div class="thread-list">
              <button class="thread-item pinned" data-thread="welcome"><span class="thread-symbol">✧</span><span class="thread-copy"><strong>はじめに</strong><small>Aqua Tuning Talkへようこそ</small><em>講師　・　1件</em></span><span class="thread-arrow">→</span></button>
              <button class="thread-item" data-thread="about"><span class="thread-symbol">◎</span><span class="thread-copy"><strong>Aqua Tuningについて</strong><small>メソッドや道具について話すスレッド</small><em>講師　・　3件</em></span><span class="thread-arrow">→</span></button>
              <button class="thread-item" data-thread="questions"><span class="thread-symbol">?</span><span class="thread-copy"><strong>質問・相談</strong><small>わからないことを気軽に質問できます</small><em>受講生　・　8件</em></span><span class="thread-arrow">→</span></button>
              <button class="thread-item" data-thread="practice"><span class="thread-symbol">◌</span><span class="thread-copy"><strong>実践シェア</strong><small>日々の気づきや実践をシェアする場所</small><em>受講生　・　5件</em></span><span class="thread-arrow">→</span></button>
              <button class="thread-item" data-thread="voice"><span class="thread-symbol">♡</span><span class="thread-copy"><strong>受講生の声</strong><small>感じたこと、変化、うれしかったこと</small><em>受講生　・　4件</em></span><span class="thread-arrow">→</span></button>
              <button class="thread-item" data-thread="news"><span class="thread-symbol">♢</span><span class="thread-copy"><strong>お知らせ</strong><small>運営からの最新情報</small><em>運営　・　2件</em></span><span class="thread-arrow">→</span></button>
            </div>
          </section>

          <section class="thread-detail" id="thread-detail" hidden aria-live="polite">
            <button class="back-button" id="thread-back">← トーク一覧へ戻る</button>
            <div class="thread-detail-head"><span class="thread-detail-label" id="thread-label">THREAD</span><h2 id="thread-title">はじめに</h2><p id="thread-description"></p></div>
            <div class="thread-posts" id="thread-posts"></div>
            <div class="composer-card">
              <div class="avatar avatar-user">上</div>
              <div class="composer-main"><textarea id="thread-input" rows="2" placeholder="このスレッドに投稿する…"></textarea><div class="composer-actions"><div class="composer-tools"><button data-toast="画像添付は準備中です">⊙ 画像</button><button data-toast="ファイル添付は準備中です">⌁ ファイル</button></div><button class="primary-button" id="thread-post-button">投稿する <span>→</span></button></div></div>
            </div>
          </section>
        </div>
      </main>

      <nav class="mobile-bottom-nav" aria-label="スマホ用ナビゲーション"><button class="mobile-bottom-link active" data-thread-list><span>◌</span><small>トーク一覧</small></button><button class="mobile-bottom-link" data-toast="お知らせ一覧は準備中です"><span>♢</span><small>お知らせ</small></button><button class="mobile-bottom-link" data-toast="プロフィールは準備中です"><span>◯</span><small>プロフィール</small></button></nav>
    </div>
    <div class="toast" id="toast" role="status"></div>
    <script src="app.js"></script>
  </body>
</html>
